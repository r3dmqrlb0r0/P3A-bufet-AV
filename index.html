<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka školního bufetu</title>

<style>
body {
 font-family: Arial, sans-serif;
 background: #f4f7fb;
}
h1 {
 text-align: center;
 background: #2a72d4;
 color: white;
 padding: 20px;
}
.container {
 width: 90%;
 max-width: 500px;
 margin: 30px auto;
 background: white;
 padding: 25px;
 border-radius: 12px;
}
.item {
 display: flex;
 justify-content: space-between;
 margin: 12px 0;
 font-size: 18px;
}
input[type="number"] {
 width: 70px;
 text-align: center;
}

/* ✅ STYL NOVĚ PŘIDANÝCH POLÍ */
input[type="text"], input[type="tel"] {
 width: 100%;
 padding: 10px;
 margin-top: 10px;
 border-radius: 6px;
 border: 1px solid #ccc;
 font-size: 16px;
}

label {
 margin-top: 15px;
 display: block;
 font-weight: bold;
}

#celkem, #pocet {
 text-align: center;
 font-size: 22px;
 margin-top: 15px;
 font-weight: bold;
 color: #2a72d4;
}

button {
 width: 100%;
 padding: 15px;
 margin-top: 30px;
 font-size: 24px;
 background: #ff6b35;
 color: white;
 border: none;
 border-radius: 10px;
 cursor: pointer;
}
button:hover {
 background: #e85a28;
}
</style>
</head>

<body>

<h1>SŠ Kostka – OBJEDNÁVKY BUFET</h1>

<div class="container">

 <!-- ✅ SEZNAM PRODUKTŮ (načtený z CSV) -->
 <div id="items"></div>

 <div id="celkem">Celková cena: 0 Kč</div>
 <div id="pocet">Počet kusů: 0</div>


 <!-- ✅ ============================================ -->
 <!-- ✅ NOVÁ POVINNÁ VÝPLŇOVÁ POLE (DLE ZADÁNÍ) -->
 <!-- ✅ ============================================ -->

 <!-- 1) JMÉNO -->
 <label>VAŠE JMÉNO (Příjmení Jméno):</label>
 <input type="text" id="jmeno" placeholder="Novák Jan">

 <!-- 2) TELEFON -->
 <label>TELEFON:</label>
 <input type="tel" id="telefon" placeholder="+420 000 000 000">

 <!-- ✅ ============================================ -->


 <!-- ✅ TLAČÍTKO -->
 <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>
let items = [];

// ✅ NAČTENÍ CSV
async function loadCSV() {
 try {
  const response = await fetch("data_bufet.csv?t=" + Date.now());
  const text = await response.text();
  parseCSV(text);
  renderItems();
 } catch {
  alert("Chyba načítání CSV.");
 }
}

// ✅ PARSOVÁNÍ CSV
function parseCSV(text) {
 items = [];
 const lines = text.split("\n");

 for (let i = 1; i < lines.length; i++) {
  const line = lines[i].trim();
  if (!line) continue;

  const [nazev, cena] = line.split(";");

  items.push({
   nazev: nazev,
   cena: parseFloat(cena),
   mnozstvi: 0
  });
 }
}

// ✅ VYKRESLENÍ POLOŽEK
function renderItems() {
 const container = document.getElementById("items");
 container.innerHTML = "";

 items.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
   <span>${item.nazev} (${item.cena} Kč)</span>
   <input type="number" min="0" value="0"
    onchange="updateItem(${index}, this.value)">
  `;

  container.appendChild(div);
 });
}

// ✅ ZMĚNA MNOŽSTVÍ
function updateItem(index, value) {
 items[index].mnozstvi = parseInt(value) || 0;
 updateSummary();
}

// ✅ PŘEPOČET SOUHRNU
function updateSummary() {
 let celkem = 0;
 let pocet = 0;

 items.forEach(item => {
  celkem += item.cena * item.mnozstvi;
  pocet += item.mnozstvi;
 });

 document.getElementById("celkem").innerText =
